<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATEC.IN &ndash; Liga Acadêmica de Biotecnologia, Biodiversidade e Inovação</title>
  <!--
    A folha de estilos principal. Para manter o protótipo simples, evitamos
    frameworks externos e definimos uma paleta de cores coerente com a
    identidade visual da Liga (ver arquivo css/styles.css).
  -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="#home" class="logo" aria-label="LATEC.IN">
        <!-- A logo é somente texto no protótipo. Pode ser substituída por
             uma imagem SVG ou PNG em assets/images -->
        LATEC<span class="dot">.IN</span>
      </a>
      <nav id="main-nav" class="main-nav">
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#quem-somos">Quem&nbsp;Somos</a></li>
          <li><a href="#portfolio">Portfólio</a></li>
          <li><a href="#capacitacao">Capacitação</a></li>
          <li><a href="#noticias">Notícias</a></li>
          <li><a href="#contato">Contato</a></li>
          <li><a href="#admin">Admin</a></li>
        </ul>
      </nav>
      <!-- botão hamburguer para mobile -->
      <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-nav">☰</button>
    </div>
  </header>

  <main id="app" class="site-main">
    <!-- O conteúdo dinâmico é injetado aqui pelas funções de renderização. -->
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <p class="footer-brand">LATEC<span class="dot">.IN</span></p>
        <p>&copy; 2026 LATEC.IN &ndash; Liga Acadêmica de Biotecnologia, Biodiversidade e Inovação.</p>
      </div>
      <nav class="footer-links" aria-label="Links rápidos do rodapé">
        <a href="#portfolio">Portfólio</a>
        <a href="#capacitacao">Capacitação</a>
        <a href="#noticias">Notícias</a>
        <a href="#contato">Contato</a>
      </nav>
    </div>
  </footer>

  <!-- Inclusão dos scripts em ordem: primeiro os dados, depois o roteador
       e as funções de renderização, filtros, área admin e inicialização. -->
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/render.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
